<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" rx="44" fill="#0F4C3A"/>

  <!-- Subtle inner glow -->
  <rect width="200" height="200" rx="44" fill="url(#bg-glow)" opacity="0.4"/>

  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#1A6B53"/>
      <stop offset="100%" stop-color="#0A3528" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="building-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E4D8"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B770"/>
      <stop offset="100%" stop-color="#C8924A"/>
    </linearGradient>
  </defs>

  <!-- Building body -->
  <rect x="44" y="95" width="112" height="68" rx="3" fill="url(#building-grad)"/>

  <!-- Roof -->
  <path d="M32 100 L100 42 L168 100 Z" fill="url(#building-grad)"/>
  <!-- Roof ridge detail -->
  <path d="M32 100 L100 42 L168 100" fill="none" stroke="#D0CCB8" stroke-width="1.5"/>

  <!-- Chimney -->
  <rect x="118" y="52" width="12" height="28" rx="2" fill="#E8E4D8"/>
  <rect x="116" y="50" width="16" height="5" rx="2" fill="#D8D4C8"/>

  <!-- Roof accent line (gold) -->
  <path d="M52 100 L100 54 L148 100" fill="none" stroke="url(#gold-grad)" stroke-width="2" opacity="0.6"/>

  <!-- Left window upper -->
  <rect x="52" y="106" width="26" height="22" rx="3" fill="url(#gold-grad)" opacity="0.9"/>
  <line x1="65" y1="106" x2="65" y2="128" stroke="#0F4C3A" stroke-width="1.5" opacity="0.3"/>
  <line x1="52" y1="117" x2="78" y2="117" stroke="#0F4C3A" stroke-width="1.5" opacity="0.3"/>

  <!-- Right window upper -->
  <rect x="122" y="106" width="26" height="22" rx="3" fill="url(#gold-grad)" opacity="0.9"/>
  <line x1="135" y1="106" x2="135" y2="128" stroke="#0F4C3A" stroke-width="1.5" opacity="0.3"/>
  <line x1="122" y1="117" x2="148" y2="117" stroke="#0F4C3A" stroke-width="1.5" opacity="0.3"/>

  <!-- Door arch -->
  <path d="M85 163 L85 136 Q85 122 100 122 Q115 122 115 136 L115 163 Z" fill="url(#gold-grad)"/>
  <!-- Door handle -->
  <circle cx="112" cy="147" r="2.5" fill="#0F4C3A" opacity="0.5"/>

  <!-- Flow wave at base -->
  <path d="M38 168 Q58 162 78 168 Q98 174 118 168 Q138 162 162 168" fill="none" stroke="url(#gold-grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M44 176 Q64 170 84 176 Q104 182 124 176 Q144 170 158 176" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Roof window (dormer) -->
  <path d="M88 80 L100 68 L112 80 L112 90 L88 90 Z" fill="url(#building-grad)"/>
  <rect x="91" y="80" width="18" height="10" rx="1" fill="url(#gold-grad)" opacity="0.8"/>
</svg>
